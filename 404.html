<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Tournament OS v7 Preview</title>
<style>
:root{
  --bg1:#2E4E7E;--bg2:#2F5E3F;--card:rgba(36,63,94,.82);--line:rgba(255,255,255,.14);
  --text:#fff;--muted:#C9D4E0;--green:#39D353;--orange:#FF8C1A;--shadow:0 12px 30px rgba(0,0,0,.30);
  --radius:18px;
}
*{box-sizing:border-box} html,body{height:100%} body{margin:0;font-family:Inter,system-ui,Arial,sans-serif;color:var(--text);background:
radial-gradient(circle at 15% 18%, rgba(255,229,156,.35), transparent 18%),
radial-gradient(circle at 86% 19%, rgba(255,231,170,.28), transparent 15%),
linear-gradient(180deg, rgba(6,17,35,.20), rgba(4,18,29,.48)),
linear-gradient(160deg,var(--bg1),var(--bg2));}
body:before{content:"";position:fixed;inset:0;opacity:.07;pointer-events:none;background-image:radial-gradient(#fff 0.7px, transparent 0.7px);background-size:7px 7px}
.shell{min-height:100%;display:flex;justify-content:center;padding:18px}
.phone{width:100%;max-width:390px;min-height:780px;border:1px solid rgba(255,255,255,.16);border-radius:30px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.4);position:relative;background:linear-gradient(180deg, rgba(9,21,39,.18), rgba(9,23,34,.26))}
.hero{padding:18px 16px 10px;border-bottom:1px solid rgba(255,255,255,.08);background:linear-gradient(180deg, rgba(8,22,41,.38), rgba(8,22,41,.18))}
.brand{display:flex;align-items:center;justify-content:space-between;gap:12px}
.brand-left{display:flex;align-items:center;gap:12px}.logo{width:48px;height:48px;border-radius:16px;background:linear-gradient(135deg,#dfff4c,#74e71a);box-shadow:0 0 18px rgba(188,255,81,.45)}
.title{font-size:20px;font-weight:800;letter-spacing:.02em}.subtitle{font-size:12px;color:var(--muted)}
.page-title{font-size:32px;font-weight:800;text-align:center;padding:14px 0 8px}
.content{padding:14px 16px 96px;display:flex;flex-direction:column;gap:16px}
.section{padding:10px;border:1px solid rgba(255,255,255,.12);border-radius:22px;background:rgba(4,15,31,.18);backdrop-filter:blur(8px);box-shadow:var(--shadow)}
.section-head{padding:8px 12px;border-radius:14px;font-weight:800;letter-spacing:.03em;text-transform:uppercase;background:linear-gradient(90deg, rgba(74,125,49,.88), rgba(98,160,57,.62));border:1px solid rgba(210,255,154,.28);margin-bottom:10px}
.stack{display:flex;flex-direction:column;gap:12px}
.card{display:flex;gap:12px;align-items:flex-start;padding:14px;border-radius:16px;background:var(--card);border:1px solid var(--line);box-shadow:var(--shadow);cursor:pointer}
.card:active{transform:translateY(1px)}
.icon{width:56px;height:56px;border-radius:18px;flex:0 0 56px;display:grid;place-items:center;font-size:28px;background:linear-gradient(135deg, rgba(208,255,83,.28), rgba(255,255,255,.06));box-shadow:0 0 18px rgba(185,255,86,.18)}
.card h3{margin:0 0 6px;font-size:21px;line-height:1.1}.meta{color:var(--muted);font-size:14px}.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:10px}
.badge{display:inline-flex;align-items:center;height:24px;padding:0 10px;border-radius:999px;font-size:12px;font-weight:700;box-shadow:0 6px 16px rgba(0,0,0,.22)}
.badge.green{background:var(--green);color:#0a2f0b}.badge.orange{background:var(--orange);color:#452300}.badge.ghost{background:rgba(255,255,255,.12);color:#fff}
.search,.seg button,.cta,.ghost-btn,.sheet input{border:none;font:inherit}.search{width:100%;padding:12px 14px;border-radius:14px;background:rgba(255,255,255,.10);color:#fff;border:1px solid rgba(255,255,255,.10)}
.search::placeholder{color:#c7d6e9}.seg{display:flex;gap:8px}.seg button,.cta,.ghost-btn{padding:11px 14px;border-radius:14px;cursor:pointer}.seg button{background:rgba(255,255,255,.08);color:#fff;border:1px solid rgba(255,255,255,.12)}.seg .active{background:#fff;color:#163152}
.cta{background:linear-gradient(135deg,#ddff4a,#74e71a);color:#133122;font-weight:800}.ghost-btn{background:rgba(255,255,255,.08);color:#fff;border:1px solid rgba(255,255,255,.12)}
.top-actions{display:flex;gap:8px}.top-actions button{flex:1}
.table{display:grid;gap:8px}.trow{display:grid;grid-template-columns:28px 1fr auto;gap:10px;padding:12px;border-radius:14px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.10)}
.muted{color:var(--muted)}.small{font-size:12px}.feed{display:flex;flex-direction:column;gap:8px}.feed-item{padding:12px;border-radius:14px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.10)}
.bottom{position:absolute;left:0;right:0;bottom:0;padding:10px 12px 14px;background:linear-gradient(180deg, rgba(7,18,34,.2), rgba(7,18,34,.86));backdrop-filter:blur(14px);border-top:1px solid rgba(255,255,255,.08)}
.nav{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.nav button{border:none;background:transparent;color:#d7e2ef;padding:10px 6px;border-radius:14px;font:inherit;font-size:12px;cursor:pointer}.nav .active{background:rgba(255,255,255,.12);color:#fff}
.hidden{display:none !important}.sheet-wrap{position:fixed;inset:0;background:rgba(0,0,0,.42);display:none;align-items:flex-end;justify-content:center;padding:16px}.sheet{width:100%;max-width:390px;background:#0f2237;border:1px solid rgba(255,255,255,.14);border-radius:22px 22px 18px 18px;padding:16px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.sheet h3{margin:0 0 12px}.sheet input{width:100%;padding:13px 14px;border-radius:14px;background:rgba(255,255,255,.08);color:#fff;border:1px solid rgba(255,255,255,.12);margin-bottom:10px}.sheet-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:8px}
.topline{display:flex;gap:8px;align-items:center;justify-content:space-between}.link{color:#dfff4c;cursor:pointer;font-weight:700}.screen-title{display:flex;align-items:center;gap:10px;margin-bottom:8px}.back{width:38px;height:38px;border-radius:12px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.08);color:#fff;cursor:pointer}
</style>
</head>
<body>
<div class="shell"><div class="phone">
  <div class="hero">
    <div class="brand">
      <div class="brand-left"><div class="logo"></div><div><div class="title">PADEL</div><div class="subtitle">Tournament OS preview v7</div></div></div>
      <div class="badge ghost" id="modeBadge">Demo mode</div>
    </div>
    <div class="page-title" id="pageTitle">My Tournaments</div>
  </div>
  <main class="content" id="app"></main>
  <div class="bottom"><div class="nav" id="nav"></div></div>
</div></div>
<div class="sheet-wrap" id="sheetWrap"><div class="sheet"><h3>Submit result</h3><input id="scoreInput" placeholder="6:3 4:6 10:8"/><div class="small muted">Any player from the match can submit the result.</div><div class="sheet-actions"><button class="ghost-btn" id="cancelSheet">Cancel</button><button class="cta" id="saveSheet">Save</button></div></div></div>
<script>
const db={
profiles:[{id:'me',name:'Anna Petrova',city:'Riga',level:'B+'},{id:'p2',name:'Mark Johnson',city:'Jurmala',level:'A'},{id:'p3',name:'Oleg Sokolov',city:'Riga',level:'B'},{id:'p4',name:'Kate Ozola',city:'Riga',level:'B'}],
clubs:[{id:'c1',name:'Riga Padel Club'},{id:'c2',name:'Jurmala Padel Center'}],
tournaments:[
{id:'t1',clubId:'c1',name:'Spring Open',status:'live',start:'2026-04-05T09:00:00Z',format:'Americano',venue:'Riga Padel Club',description:'Live weekend event.'},
{id:'t2',clubId:'c2',name:'Baltic Mix Cup',status:'open',start:'2026-04-12T10:00:00Z',format:'Groups',venue:'Jurmala Padel Center',description:'Registration completed soon.'},
{id:'t3',clubId:'c1',name:'City Night Padel',status:'open',start:'2026-04-16T18:30:00Z',format:'Mexicano',venue:'Riga Padel Club',description:'Short evening format.'},
{id:'t4',clubId:'c1',name:'March Club Series',status:'finished',start:'2026-03-12T09:00:00Z',format:'Groups',venue:'Riga Padel Club',description:'Finished event.'}
],
tournamentPlayers:[
{id:'tp1',tournamentId:'t1',profileId:'me',status:'joined'},{id:'tp2',tournamentId:'t1',profileId:'p2',status:'joined'},{id:'tp3',tournamentId:'t1',profileId:'p3',status:'joined'},{id:'tp4',tournamentId:'t1',profileId:'p4',status:'joined'},
{id:'tp5',tournamentId:'t2',profileId:'me',status:'joined'},{id:'tp6',tournamentId:'t4',profileId:'me',status:'joined'}
],
matches:[{id:'m1',tournamentId:'t1',court:'Court 1',time:'2026-04-05T09:30:00Z',status:'missing'},{id:'m2',tournamentId:'t1',court:'Court 2',time:'2026-04-05T11:00:00Z',status:'missing'}],
matchPlayers:[
{id:'mp1',matchId:'m1',profileId:'me',team:1},{id:'mp2',matchId:'m1',profileId:'p2',team:1},{id:'mp3',matchId:'m1',profileId:'p3',team:2},{id:'mp4',matchId:'m1',profileId:'p4',team:2},
{id:'mp5',matchId:'m2',profileId:'me',team:2},{id:'mp6',matchId:'m2',profileId:'p4',team:2},{id:'mp7',matchId:'m2',profileId:'p2',team:1},{id:'mp8',matchId:'m2',profileId:'p3',team:1}
],
results:[],
standings:[{tournamentId:'t1',profileId:'me',played:0,won:0,lost:0,points:0,diff:0},{tournamentId:'t1',profileId:'p2',played:0,won:0,lost:0,points:0,diff:0},{tournamentId:'t1',profileId:'p3',played:0,won:0,lost:0,points:0,diff:0},{tournamentId:'t1',profileId:'p4',played:0,won:0,lost:0,points:0,diff:0}],
activity:[{time:'2026-04-02T07:20:00Z',text:'Spring Open moved to LIVE'},{time:'2026-04-01T09:12:00Z',text:'Joined Baltic Mix Cup'}]
};
const state={view:'home',tournamentId:null,tab:'overview',filter:'all',sheetMatchId:null};
const app=document.getElementById('app'),nav=document.getElementById('nav'),pageTitle=document.getElementById('pageTitle');
const sheetWrap=document.getElementById('sheetWrap'),scoreInput=document.getElementById('scoreInput');
const profile=id=>db.profiles.find(x=>x.id===id); const tournament=id=>db.tournaments.find(x=>x.id===id);
const myMembership=id=>db.tournamentPlayers.find(x=>x.tournamentId===id&&x.profileId==='me'&&x.status!=='withdrawn');
const fmt=d=>new Date(d).toLocaleString('en-GB',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
const esc=s=>String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
function save(){localStorage.setItem('padel_v7_preview',JSON.stringify(db))} function load(){const raw=localStorage.getItem('padel_v7_preview');if(raw){Object.assign(db,JSON.parse(raw))}} load();
function recalc(tId){const rows=db.tournamentPlayers.filter(x=>x.tournamentId===tId&&x.status==='joined').map(x=>x.profileId);const map={};rows.forEach(id=>map[id]={tournamentId:tId,profileId:id,played:0,won:0,lost:0,points:0,diff:0});db.matches.filter(m=>m.tournamentId===tId).forEach(m=>{const r=db.results.find(x=>x.matchId===m.id); if(!r) return; const ps=db.matchPlayers.filter(x=>x.matchId===m.id); const t1=ps.filter(x=>x.team===1).map(x=>x.profileId), t2=ps.filter(x=>x.team===2).map(x=>x.profileId); const winners=r.winner===1?t1:t2, losers=r.winner===1?t2:t1; [...t1,...t2].forEach(id=>map[id]&&(map[id].played++)); winners.forEach(id=>map[id]&&(map[id].won++,map[id].points+=3,map[id].diff++)); losers.forEach(id=>map[id]&&(map[id].lost++,map[id].diff--))}); db.standings=db.standings.filter(x=>x.tournamentId!==tId).concat(Object.values(map));}
function parseScore(s){const sets=String(s).trim().split(/\s+/).map(x=>x.split(':').map(Number)).filter(x=>x.length===2&&!x.some(Number.isNaN)); let a=0,b=0; sets.forEach(([x,y])=>x>y?a++:y>x?b++:0); if(!sets.length||a===b) throw new Error('Wrong score'); return {display:s,winner:a>b?1:2}};
function navItems(){return [{id:'home',label:'New'},{id:'matches',label:'Matches'},{id:'history',label:'History'},{id:'profile',label:'Profile'}]}
function renderNav(){nav.innerHTML=navItems().map(n=>`<button class="${state.view===n.id?'active':''}" data-nav="${n.id}">${n.label}</button>`).join(''); [...nav.querySelectorAll('button')].forEach(b=>b.onclick=()=>{state.view=b.dataset.nav;state.tournamentId=null;render()})}
function cardTournament(t,{my=false}={}){const membership=myMembership(t.id); const status=t.status==='live'?'In Progress':membership?'Joined':'Open'; const badge=t.status==='live'?'<span class="badge green">In Progress</span>':membership?'<span class="badge orange">Joined</span>':'<span class="badge ghost">Open</span>'; return `<div class="card" data-open="${t.id}"><div class="icon">${t.status==='live'?'🎾':'🏆'}</div><div style="flex:1"><h3>${esc(t.name)}</h3><div class="meta">Starts: ${fmt(t.start)} · ${esc(t.format)}</div><div class="row">${badge}${my&&t.status==='live'?'<span class="badge orange">Group Stage</span>':''}<span class="badge ghost">${esc(t.venue)}</span></div></div></div>`}
function home(){const my=db.tournaments.filter(t=>t.status!=='finished'&&myMembership(t.id)); const avail=db.tournaments.filter(t=>t.status==='open'&&!myMembership(t.id)); return `<input class="search" placeholder="Search tournaments" id="homeSearch"><section class="section"><div class="section-head">My Tournaments</div><div class="stack">${my.map(t=>cardTournament(t,{my:true})).join('')}</div></section><section class="section"><div class="section-head">Available Tournaments</div><div class="stack">${avail.map(t=>cardTournament(t)).join('')}</div></section><section class="section"><div class="section-head">Activity</div><div class="feed">${db.activity.slice(0,4).map(a=>`<div class="feed-item">${esc(a.text)}<div class="small muted">${fmt(a.time)}</div></div>`).join('')}</div></section>`}
function myMatches(){const matches=db.matches.filter(m=>db.matchPlayers.some(mp=>mp.matchId===m.id&&mp.profileId==='me')); return `<div class="seg"><button class="${state.filter==='all'?'active':''}" data-filter="all">All</button><button class="${state.filter==='missing'?'active':''}" data-filter="missing">Pending</button><button class="${state.filter==='submitted'?'active':''}" data-filter="submitted">Submitted</button></div><section class="section"><div class="section-head">My Matches</div><div class="stack">${matches.filter(m=>state.filter==='all'||m.status===state.filter).map(m=>{const players=db.matchPlayers.filter(x=>x.matchId===m.id); const t1=players.filter(x=>x.team===1).map(x=>profile(x.profileId).name).join(' / '); const t2=players.filter(x=>x.team===2).map(x=>profile(x.profileId).name).join(' / '); const result=db.results.find(x=>x.matchId===m.id); return `<div class="card"><div style="flex:1"><h3>${esc(tournament(m.tournamentId).name)}</h3><div class="meta">${esc(m.court)} · ${fmt(m.time)}</div><div class="row"><span class="badge ghost">${esc(t1)}</span><span class="badge ghost">vs</span><span class="badge ghost">${esc(t2)}</span></div><div class="row"><span class="badge ${result?'green':'orange'}">${result?esc(result.display):'Pending'}</span><button class="cta" data-submit="${m.id}">${result?'Update result':'Submit result'}</button></div></div></div>`}).join('')}</div></section>`}
function history(){const items=db.tournaments.filter(t=>t.status==='finished'&&myMembership(t.id)); return `<section class="section"><div class="section-head">History</div><div class="stack">${items.map(t=>cardTournament(t,{my:true})).join('')||'<div class="muted">No finished tournaments yet.</div>'}</div></section>`}
function profileView(){const me=profile('me'); const joined=db.tournamentPlayers.filter(x=>x.profileId==='me'&&x.status==='joined').length; return `<section class="section"><div class="section-head">Profile</div><div class="card" style="cursor:default"><div class="icon">${me.name.split(' ').map(x=>x[0]).join('').slice(0,2)}</div><div><h3>${esc(me.name)}</h3><div class="meta">${esc(me.city)} · Level ${esc(me.level)}</div><div class="row"><span class="badge ghost">Joined tournaments: ${joined}</span><span class="badge ghost">Demo player</span></div></div></div></section><section class="section"><div class="section-head">System</div><div class="top-actions"><button class="ghost-btn" id="resetDemo">Reset demo data</button></div></section>`}
function tournamentView(id){const t=tournament(id); const membership=myMembership(id); const standings=db.standings.filter(x=>x.tournamentId===id).sort((a,b)=>b.points-a.points||b.diff-a.diff).map((r,i)=>({...r,rank:i+1})); const players=db.tournamentPlayers.filter(x=>x.tournamentId===id).map(x=>({row:x,p:profile(x.profileId)})); const matches=db.matches.filter(x=>x.tournamentId===id); return `<div class="screen-title"><button class="back" id="backBtn">←</button><div><div class="small muted">Tournament</div><div style="font-size:22px;font-weight:800">${esc(t.name)}</div></div></div><section class="section"><div class="section-head">Overview</div><div class="stack"><div class="meta">${esc(t.description)}</div><div class="row"><span class="badge ${t.status==='live'?'green':'orange'}">${esc(t.status)}</span><span class="badge ghost">${esc(t.format)}</span><span class="badge ghost">${esc(t.venue)}</span></div><div class="meta">Starts: ${fmt(t.start)}</div><div class="top-actions">${membership?'<button class="ghost-btn" id="withdrawBtn">Withdraw</button>':'<button class="cta" id="joinBtn">Join tournament</button>'}<button class="ghost-btn" id="matchesTabBtn">Open matches</button></div></div></section><section class="section"><div class="section-head">Standings</div><div class="table">${standings.map(r=>`<div class="trow"><div>${r.rank}</div><div><strong>${esc(profile(r.profileId).name)}</strong><div class="small muted">Played ${r.played} · Won ${r.won} · Lost ${r.lost}</div></div><div>${r.points} pts</div></div>`).join('')||'<div class="muted">No standings yet.</div>'}</div></section><section class="section"><div class="section-head">Players</div><div class="table">${players.map(x=>`<div class="trow"><div>•</div><div><strong>${esc(x.p.name)}</strong><div class="small muted">${esc(x.p.city)} · ${esc(x.row.status)}</div></div><div>${esc(x.p.level)}</div></div>`).join('')}</div></section><section class="section"><div class="section-head">Matches</div><div class="stack">${matches.map(m=>{const players=db.matchPlayers.filter(x=>x.matchId===m.id); const t1=players.filter(x=>x.team===1).map(x=>profile(x.profileId).name).join(' / '); const t2=players.filter(x=>x.team===2).map(x=>profile(x.profileId).name).join(' / '); const result=db.results.find(x=>x.matchId===m.id); return `<div class="card"><div style="flex:1"><div style="font-weight:800">${esc(m.court)} · ${fmt(m.time)}</div><div class="meta">${esc(t1)} vs ${esc(t2)}</div><div class="row"><span class="badge ${result?'green':'orange'}">${result?esc(result.display):'Pending'}</span>${db.matchPlayers.some(x=>x.matchId===m.id&&x.profileId==='me')?`<button class="cta" data-submit="${m.id}">Submit result</button>`:''}</div></div></div>`}).join('')}</div></section>`}
function bind(){document.querySelectorAll('[data-open]').forEach(el=>el.onclick=()=>{state.tournamentId=el.dataset.open; render()}); document.querySelectorAll('[data-submit]').forEach(el=>el.onclick=()=>openSheet(el.dataset.submit)); document.querySelectorAll('[data-filter]').forEach(el=>el.onclick=()=>{state.filter=el.dataset.filter; render()}); const back=document.getElementById('backBtn'); if(back) back.onclick=()=>{state.tournamentId=null; render()}; const join=document.getElementById('joinBtn'); if(join) join.onclick=()=>{db.tournamentPlayers.push({id:'tp'+Date.now(),tournamentId:state.tournamentId,profileId:'me',status:'joined'}); db.activity.unshift({time:new Date().toISOString(),text:'Joined '+tournament(state.tournamentId).name}); save(); render()}; const withdraw=document.getElementById('withdrawBtn'); if(withdraw) withdraw.onclick=()=>{const row=myMembership(state.tournamentId); if(row){row.status='withdrawn'; db.activity.unshift({time:new Date().toISOString(),text:'Withdrawn from '+tournament(state.tournamentId).name}); save(); state.tournamentId=null; render()}}; const mt=document.getElementById('matchesTabBtn'); if(mt) mt.onclick=()=>{state.view='matches';state.tournamentId=null;render()}; const reset=document.getElementById('resetDemo'); if(reset) reset.onclick=()=>{localStorage.removeItem('padel_v7_preview'); location.reload()}}
function openSheet(matchId){state.sheetMatchId=matchId; scoreInput.value=(db.results.find(x=>x.matchId===matchId)||{}).display||''; sheetWrap.style.display='flex'; scoreInput.focus()}
function closeSheet(){sheetWrap.style.display='none'; state.sheetMatchId=null}
function render(){renderNav(); pageTitle.textContent=state.tournamentId?'Tournament Detail':({home:'My Tournaments',matches:'My Matches',history:'My History',profile:'My Profile'}[state.view]); app.innerHTML=state.tournamentId?tournamentView(state.tournamentId):({home,matches:myMatches,history,profile:profileView}[state.view]()); bind();}
document.getElementById('cancelSheet').onclick=closeSheet; sheetWrap.onclick=e=>{if(e.target===sheetWrap)closeSheet()}; document.getElementById('saveSheet').onclick=()=>{try{const parsed=parseScore(scoreInput.value); const m=db.matches.find(x=>x.id===state.sheetMatchId); let row=db.results.find(x=>x.matchId===state.sheetMatchId); if(row) Object.assign(row,parsed); else db.results.push({matchId:state.sheetMatchId,...parsed}); m.status='submitted'; recalc(m.tournamentId); db.activity.unshift({time:new Date().toISOString(),text:'Result submitted in '+tournament(m.tournamentId).name}); save(); closeSheet(); render()}catch(err){alert('Enter score like 6:3 4:6 10:8')}};
render();
</script>
</body></html>
