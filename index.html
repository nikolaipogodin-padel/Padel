<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Padel Riga</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="wrap">
    <section class="card top-card">
      <div class="head">
        <h1>Padel Riga</h1>
        <div class="toolbar">
          <button id="demo20Btn" class="btn secondary">Демо 20</button>
          <button id="generateBtn" class="btn primary">Сформировать турнир</button>
          <button id="resetBtn" class="btn ghost">Сбросить</button>
        </div>
      </div>

      <div class="settings-grid">
        <label>
          Турнир
          <input id="tournamentName" type="text" value="Riga Padel Cup" />
        </label>
        <label>
          Длительность
          <select id="durationSelect">
            <option value="90">1.5 часа</option>
            <option value="120" selected>2 часа</option>
            <option value="180">3 часа</option>
          </select>
        </label>
        <label>
          Старт
          <input id="startTime" type="time" value="10:00" />
        </label>
      </div>
    </section>

    <section class="grid two-col">
      <div class="card">
        <div class="section-title-row">
          <h2>Игроки</h2>
          <div id="participantsCount" class="pill">0</div>
        </div>

        <form id="playerForm" class="add-player-row">
          <input id="playerName" type="text" placeholder="Имя игрока" required />
          <button type="submit" class="btn primary">Добавить</button>
        </form>

        <div id="playersView" class="list"></div>
      </div>

      <div class="card">
        <div class="section-title-row">
          <h2>Параметры</h2>
        </div>
        <div id="summaryView" class="summary"></div>
      </div>
    </section>

    <section class="grid two-col">
      <div class="card">
        <div class="section-title-row">
          <h2>Пары</h2>
          <div id="pairsCount" class="pill">0</div>
        </div>
        <div id="pairsView" class="list"></div>
      </div>

      <div class="card">
        <div class="section-title-row">
          <h2>Очередь</h2>
          <div id="queueCount" class="pill">0</div>
        </div>
        <div id="queueView" class="list"></div>
      </div>
    </section>

    <section class="card">
      <div class="section-title-row">
        <h2>Сетка</h2>
      </div>
      <div id="scheduleView" class="schedule"></div>
    </section>

    <section class="grid two-col">
      <div class="card">
        <div class="section-title-row">
          <h2>Результаты</h2>
        </div>
        <div id="matchesView" class="matches"></div>
      </div>

      <div class="card">
        <div class="section-title-row">
          <h2>Таблица</h2>
        </div>
        <div id="standingsView"></div>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
