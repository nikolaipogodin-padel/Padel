<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tournament OS — Player Home</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-bg"></div>
  <div class="app-shell">
    <main class="phone-frame">
      <header class="screen-header">
        <h1>My Tournaments</h1>
      </header>

      <section id="homeView" class="view is-active">
        <div class="screen-content">
          <section class="board-card board-card--hero" aria-label="my tournaments section">
            <div class="board-head">
              <div class="racket-badge" aria-hidden="true">
                <div class="racket"></div>
                <div class="ball"></div>
              </div>
              <div class="board-title-wrap">
                <div class="board-title">MY TOURNAMENTS</div>
                <div class="board-line"></div>
              </div>
            </div>
            <div id="myTournamentList" class="card-stack"></div>
          </section>

          <section class="section-band" aria-hidden="true">
            <span></span>
            <strong>AVAILABLE TOURNAMENTS</strong>
            <span></span>
          </section>

          <section class="board-card board-card--list" aria-label="available tournaments section">
            <div id="availableTournamentList" class="card-stack compact"></div>
          </section>
        </div>
      </section>

      <section id="newView" class="view">
        <div class="screen-content alt-screen">
          <div class="panel-title">New Tournaments</div>
          <div id="newTournamentList" class="board-card board-card--list"></div>
        </div>
      </section>

      <section id="historyView" class="view">
        <div class="screen-content alt-screen">
          <div class="panel-title">My History</div>
          <div id="historyTournamentList" class="board-card board-card--list"></div>
        </div>
      </section>

      <section id="profileView" class="view">
        <div class="screen-content alt-screen">
          <div class="panel-title">My Profile</div>
          <div class="board-card profile-card">
            <div class="profile-avatar">NP</div>
            <div class="profile-name">Nikolaj Pogodin</div>
            <div class="profile-meta">Member of 4 clubs</div>
            <div class="profile-stats">
              <div><strong>12</strong><span>Tournaments</span></div>
              <div><strong>34</strong><span>Matches</span></div>
              <div><strong>68%</strong><span>Wins</span></div>
            </div>
          </div>
        </div>
      </section>

      <nav class="bottom-nav" aria-label="Bottom navigation">
        <button class="nav-item" data-view="newView" type="button">
          <span class="nav-icon calendar"></span>
          <span class="nav-label">New Tournaments</span>
        </button>
        <button class="nav-item" data-view="historyView" type="button">
          <span class="nav-icon history"></span>
          <span class="nav-label">My History</span>
        </button>
        <button class="nav-item is-active" data-view="profileView" type="button">
          <span class="nav-icon profile"></span>
          <span class="nav-label">My Profile</span>
        </button>
      </nav>
    </main>
  </div>

  <template id="tournamentCardTemplate">
    <article class="tournament-card" tabindex="0" role="button">
      <div class="card-icon"></div>
      <div class="card-body">
        <div class="card-name"></div>
        <div class="card-date"></div>
        <div class="card-status-row">
          <span class="status-pill"></span>
        </div>
        <div class="card-meta"></div>
      </div>
    </article>
  </template>

  <script src="app.js"></script>
</body>
</html>
