<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Padel Tournament OS</title>
  <meta name="theme-color" content="#08140f" />
  <style>
    :root{
      --bg:#07110d;
      --panel:rgba(10,29,23,.38);
      --panel-2:rgba(8,22,18,.55);
      --line:rgba(173,255,205,.26);
      --line-soft:rgba(174,255,211,.14);
      --text:#f3fff7;
      --muted:#c9ddd2;
      --green:#72ff9a;
      --green-2:#1adf66;
      --blue:#74c9ff;
      --shadow:0 18px 80px rgba(0,0,0,.46), inset 0 1px 0 rgba(255,255,255,.06);
      --radius:26px;
      --radius-sm:18px;
      --safe-bottom: max(18px, env(safe-area-inset-bottom));
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 50% 10%, rgba(120,70,210,.18), transparent 32%),
        radial-gradient(circle at 50% 78%, rgba(74,255,145,.12), transparent 30%),
        linear-gradient(180deg, rgba(5,7,14,.22) 0%, rgba(4,10,8,.56) 22%, rgba(4,10,8,.82) 100%),
        url('assets/background.jpg') center/cover fixed no-repeat;
      overflow-x:hidden;
    }
    body::before{
      content:""; position:fixed; inset:0; pointer-events:none;
      background:
        linear-gradient(180deg, rgba(6,12,22,.20) 0%, rgba(6,12,22,.05) 18%, rgba(5,15,10,.58) 72%, rgba(5,15,10,.82) 100%),
        radial-gradient(circle at center, transparent 48%, rgba(0,0,0,.34) 100%);
      z-index:0;
    }
    body::after{
      content:""; position:fixed; inset:0; pointer-events:none; z-index:0;
      background-image: radial-gradient(rgba(255,255,255,.06) .6px, transparent .6px);
      background-size: 8px 8px; opacity:.055; mix-blend-mode:screen;
    }
    .app{position:relative; z-index:1; min-height:100%; max-width:440px; margin:0 auto; padding:22px 18px calc(110px + var(--safe-bottom));}
    .topbar{
      display:flex; align-items:center; justify-content:space-between; gap:12px;
      padding:14px 16px; border-radius:24px; margin-top:8px; backdrop-filter:blur(16px);
      background:linear-gradient(180deg, rgba(16,37,30,.38), rgba(9,24,18,.5));
      border:1px solid var(--line-soft); box-shadow:var(--shadow), 0 0 0 1px rgba(117,255,171,.04), 0 0 34px rgba(76,255,149,.12);
    }
    .brand{display:flex; align-items:center; gap:12px; min-width:0}
    .brand-logo{width:52px; height:36px; filter: drop-shadow(0 0 12px rgba(98,255,152,.25));}
    .brand-name{font-size:30px; font-weight:800; letter-spacing:.03em; font-style:italic; color:#8dffaf;
      text-shadow:0 0 18px rgba(66,255,138,.18), 0 1px 0 rgba(255,255,255,.15);}
    .avatar-wrap{display:flex; align-items:center; gap:10px;}
    .avatar{
      width:52px; height:52px; border-radius:50%; overflow:hidden; border:2px solid rgba(124,255,168,.6);
      box-shadow:0 0 0 4px rgba(103,255,155,.08), 0 0 22px rgba(69,255,133,.22);
      background:linear-gradient(135deg, #1a5133, #0b1612);
      flex:0 0 auto;
    }
    .avatar img{width:100%; height:100%; object-fit:cover}
    .status-dot{width:18px; height:18px; border-radius:50%; background:radial-gradient(circle at 35% 35%, #c8ffd5 0 18%, #47ef76 40%, #12a441 100%); box-shadow:0 0 16px rgba(54,255,113,.65)}
    .section{margin-top:26px}
    .section-title{
      display:flex; align-items:center; gap:12px; margin:0 0 16px; padding:0 8px;
      font-size:31px; line-height:1.05; font-weight:750; letter-spacing:-.02em;
      text-shadow:0 4px 28px rgba(0,0,0,.3);
    }
    .section-title.small{font-size:28px}
    .diamond{width:14px; height:14px; transform:rotate(45deg); border-radius:2px; background:linear-gradient(135deg, #d5ffe4, #2fef7a); box-shadow:0 0 18px rgba(76,255,140,.52), inset 0 0 8px rgba(255,255,255,.45)}
    .diamond.blue{background:linear-gradient(135deg, #dbf4ff, #34b7ff); box-shadow:0 0 18px rgba(52,183,255,.45), inset 0 0 8px rgba(255,255,255,.4)}

    .card{
      position:relative; display:grid; grid-template-columns:86px 1fr auto; gap:16px; align-items:center;
      padding:18px 18px 18px 16px; border-radius:26px; overflow:hidden; cursor:pointer;
      background:
        linear-gradient(180deg, rgba(12,31,24,.56), rgba(7,18,15,.62)),
        linear-gradient(90deg, rgba(124,255,176,.04), transparent 40%);
      border:1px solid rgba(131,255,188,.25);
      box-shadow: var(--shadow), inset 0 0 0 1px rgba(170,255,205,.03), 0 0 26px rgba(72,255,138,.10);
      backdrop-filter: blur(16px) saturate(118%);
      transition: transform .26s ease, box-shadow .26s ease, border-color .26s ease;
    }
    .card + .card{margin-top:16px}
    .card::before{
      content:""; position:absolute; inset:0; pointer-events:none;
      background:
        radial-gradient(circle at 12% 50%, rgba(112,255,153,.18), transparent 28%),
        linear-gradient(90deg, rgba(119,255,164,.12), transparent 26%),
        linear-gradient(180deg, rgba(255,255,255,.04), transparent 30%);
    }
    .card::after{
      content:""; position:absolute; inset:1px; border-radius:25px; pointer-events:none;
      border:1px solid rgba(255,255,255,.04);
    }
    .card.blue{
      background:
        linear-gradient(180deg, rgba(10,25,34,.54), rgba(7,18,26,.62)),
        linear-gradient(90deg, rgba(116,201,255,.04), transparent 40%);
      border-color:rgba(126,210,255,.24);
      box-shadow: var(--shadow), inset 0 0 0 1px rgba(214,243,255,.03), 0 0 24px rgba(70,168,255,.10);
    }
    .card:hover{transform:translateY(-2px); box-shadow: var(--shadow), 0 0 36px rgba(72,255,138,.14)}
    .card.blue:hover{box-shadow: var(--shadow), 0 0 34px rgba(70,168,255,.14)}
    .icon-shell{
      width:84px; height:84px; border-radius:22px; display:grid; place-items:center; position:relative;
      background:radial-gradient(circle at 35% 25%, rgba(118,255,168,.18), rgba(16,31,24,.86) 70%);
      border:1px solid rgba(140,255,192,.18);
      box-shadow:inset 0 0 40px rgba(72,255,136,.09), 0 0 24px rgba(72,255,136,.10);
    }
    .card.blue .icon-shell{background:radial-gradient(circle at 35% 25%, rgba(123,212,255,.16), rgba(14,22,31,.86) 70%); border-color:rgba(142,214,255,.18); box-shadow:inset 0 0 40px rgba(73,175,255,.08), 0 0 24px rgba(73,175,255,.10)}
    .icon-shell svg{width:64px; height:64px; filter:drop-shadow(0 0 12px rgba(92,255,155,.16))}
    .card.blue .icon-shell svg{filter:drop-shadow(0 0 12px rgba(96,184,255,.18))}
    .content{min-width:0}
    .title{font-size:26px; line-height:1.08; font-weight:760; letter-spacing:-.03em; margin:0 0 8px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
    .meta{font-size:17px; line-height:1.38; color:var(--muted)}
    .badge{
      align-self:start; white-space:nowrap; padding:12px 16px; border-radius:16px; font-size:14px; font-weight:720;
      letter-spacing:.01em; background:rgba(19,48,31,.72); color:#f2fff6;
      border:1px solid rgba(123,255,171,.38); box-shadow:inset 0 0 0 1px rgba(255,255,255,.04), 0 0 18px rgba(76,255,140,.10);
      backdrop-filter:blur(10px);
    }
    .card.blue .badge{background:rgba(17,39,56,.72); border-color:rgba(114,204,255,.35); box-shadow:inset 0 0 0 1px rgba(255,255,255,.04), 0 0 18px rgba(54,167,255,.10)}

    .bottom-nav{
      position:fixed; left:50%; transform:translateX(-50%); bottom:14px; width:min(440px, calc(100vw - 20px)); z-index:10;
      padding:12px 12px calc(12px + env(safe-area-inset-bottom));
      border-radius:28px; backdrop-filter: blur(18px) saturate(118%);
      background:linear-gradient(180deg, rgba(8,18,15,.58), rgba(5,13,10,.78));
      border:1px solid rgba(117,255,171,.14);
      box-shadow: 0 14px 50px rgba(0,0,0,.48), inset 0 0 0 1px rgba(255,255,255,.03), 0 0 28px rgba(72,255,138,.10);
    }
    .bottom-nav::before{
      content:""; position:absolute; left:10%; right:10%; top:0; height:1px; background:linear-gradient(90deg, transparent, rgba(117,255,171,.5), transparent);
      box-shadow:0 0 18px rgba(72,255,138,.28);
    }
    .nav-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:8px}
    .nav-item{
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; min-height:78px; border-radius:20px;
      color:#d8f4e0; text-decoration:none; position:relative; transition:background .22s ease, transform .22s ease, color .22s ease;
    }
    .nav-item:hover{background:rgba(117,255,171,.06); transform:translateY(-1px)}
    .nav-item.active{color:#ffffff}
    .nav-item.active::after{
      content:""; position:absolute; bottom:2px; left:18%; right:18%; height:2px; border-radius:999px;
      background:linear-gradient(90deg, transparent, rgba(117,255,171,.95), transparent); box-shadow:0 0 18px rgba(72,255,138,.45);
    }
    .nav-item svg{width:30px; height:30px; opacity:.95; filter:drop-shadow(0 0 10px rgba(72,255,138,.16))}
    .nav-item span{font-size:14px; line-height:1; font-weight:560}
    .sparkle{position:fixed; right:16px; bottom:18px; z-index:11; width:34px; height:34px; opacity:.9; filter:drop-shadow(0 0 12px rgba(255,255,255,.28))}

    @media (max-width:390px){
      .app{padding-inline:14px}
      .topbar{padding:12px 14px}
      .brand-name{font-size:26px}
      .section-title{font-size:28px}
      .card{grid-template-columns:72px 1fr; gap:14px; padding:16px}
      .badge{grid-column:2; justify-self:start; margin-top:-2px; padding:10px 14px}
      .icon-shell{width:72px; height:72px}
      .icon-shell svg{width:54px; height:54px}
      .title{font-size:22px}
      .meta{font-size:16px}
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <svg class="brand-logo" viewBox="0 0 64 44" fill="none" aria-hidden="true">
          <path d="M6 30.5C14.8 11.7 36.1 3.8 56 8.8C43.9 11.1 34.9 16.5 28.6 24.3C22.2 32.2 18.7 39.3 18 41H6.5C6.1 41 5.8 40.6 5.9 40.1L6 30.5Z" stroke="#72FF9A" stroke-width="3" stroke-linejoin="round"/>
          <path d="M8 31.1C16.4 21.5 28.2 16.6 43.3 16.5C50.1 16.4 56.2 17.2 61 18.5" stroke="#72FF9A" stroke-width="3" stroke-linecap="round"/>
          <path d="M6 31H30.3C42.4 31 52.4 24.7 58.7 14.7" stroke="#72FF9A" stroke-width="3" stroke-linecap="round"/>
        </svg>
        <div class="brand-name">PADEL</div>
      </div>
      <div class="avatar-wrap">
        <div class="avatar"><img alt="Player avatar" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop stop-color='%233f7f58'/><stop offset='1' stop-color='%2313211b'/></linearGradient></defs><rect width='100' height='100' fill='url(%23g)'/><circle cx='50' cy='38' r='18' fill='%23f0d4bf'/><path d='M20 94c5-18 18-28 30-28s25 10 30 28' fill='%23f0d4bf'/><path d='M33 42c2-11 9-19 18-19 9 0 16 8 18 19-2-2-6-5-10-6-5 7-17 9-26 6z' fill='%23291f1f'/></svg>" /></div>
        <div class="status-dot" aria-hidden="true"></div>
      </div>
    </header>

    <section class="section">
      <h1 class="section-title"><span>My Tournaments</span><span class="diamond"></span></h1>
      <article class="card" tabindex="0">
        <div class="icon-shell">
          <svg viewBox="0 0 64 64" fill="none" aria-hidden="true">
            <defs>
              <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
                <stop stop-color="#8CFFB0"/>
                <stop offset="1" stop-color="#22D564"/>
              </linearGradient>
            </defs>
            <circle cx="40" cy="25" r="11" stroke="url(#g1)" stroke-width="3"/>
            <path d="M16 45c8-10 19-16 33-18" stroke="url(#g1)" stroke-width="3.5" stroke-linecap="round"/>
            <path d="M12 50l7-28 13 3-7 28" stroke="url(#g1)" stroke-width="3.5" stroke-linejoin="round"/>
            <path d="M18 28l6 1.4M16.6 34l6 1.4M15.2 40l6 1.4M13.8 46l6 1.4" stroke="url(#g1)" stroke-width="2" stroke-linecap="round" opacity=".95"/>
          </svg>
        </div>
        <div class="content">
          <h2 class="title">Padel Cup Weekend</h2>
          <div class="meta">Starts: April 25, 2024<br/>Team: Dynamic Duo</div>
        </div>
        <div class="badge">In Progress</div>
      </article>
    </section>

    <section class="section">
      <h2 class="section-title small"><span class="diamond blue"></span><span>Available Tournaments</span></h2>
      <article class="card blue" tabindex="0">
        <div class="icon-shell">
          <svg viewBox="0 0 64 64" fill="none" aria-hidden="true">
            <defs>
              <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
                <stop stop-color="#B9E6FF"/>
                <stop offset="1" stop-color="#2E9CFF"/>
              </linearGradient>
            </defs>
            <path d="M18 14h28v6c0 8 4 13 8 15-1 8-7 15-15 17v4h9v4H16v-4h9v-4C17 48 11 41 10 33c4-2 8-7 8-15v-4z" stroke="url(#g2)" stroke-width="3.2" stroke-linejoin="round"/>
            <path d="M24 20h16M21 29h22" stroke="url(#g2)" stroke-width="2.4" stroke-linecap="round" opacity=".95"/>
          </svg>
        </div>
        <div class="content">
          <h2 class="title">Weekly Padel Challenge</h2>
          <div class="meta">Starts: Tomorrow<br/>Mixed Doubles</div>
        </div>
        <div class="badge">Group Stage</div>
      </article>
    </section>
  </main>

  <nav class="bottom-nav" aria-label="Primary">
    <div class="nav-grid">
      <a href="#" class="nav-item active">
        <svg viewBox="0 0 24 24" fill="none"><path d="M4 7.5h16M6.5 3.5v4M17.5 3.5v4M5.5 20.5h13A1.5 1.5 0 0 0 20 19V7.5H4V19A1.5 1.5 0 0 0 5.5 20.5Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M8 12h3M13 12h3M8 16h8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        <span>New</span>
      </a>
      <a href="#" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none"><path d="M7 4.5h10A1.5 1.5 0 0 1 18.5 6v14l-4-2-4 2-4-2-4 2V6A1.5 1.5 0 0 1 4 4.5h3Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M8 9h8M8 13h8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        <span>Matches</span>
      </a>
      <a href="#" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none"><path d="M6 4.5h12A1.5 1.5 0 0 1 19.5 6v12A1.5 1.5 0 0 1 18 19.5H6A1.5 1.5 0 0 1 4.5 18V6A1.5 1.5 0 0 1 6 4.5Z" stroke="currentColor" stroke-width="1.8"/><path d="M8 8.5h8M8 12h8M8 15.5h5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        <span>History</span>
      </a>
      <a href="#" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="3.5" stroke="currentColor" stroke-width="1.8"/><path d="M5 19c1.6-3 4-4.5 7-4.5s5.4 1.5 7 4.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        <span>Profile</span>
      </a>
    </div>
  </nav>

  <svg class="sparkle" viewBox="0 0 36 36" fill="none" aria-hidden="true">
    <path d="M18 4c1.2 5.7 2.2 6.9 7 8-4.8 1.1-5.8 2.3-7 8-1.2-5.7-2.2-6.9-7-8 4.8-1.1 5.8-2.3 7-8z" fill="rgba(255,255,255,.88)"/>
  </svg>
</body>
</html>
