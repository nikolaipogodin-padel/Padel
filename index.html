<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Padel Club — v16.4</title>
  <link rel="stylesheet" href="styles.css?v=16.4" />
</head>
<body>
  <header class="topbar">
    <div class="container topbar-inner">
      <div class="brand-block">
        <div class="brand-mark">P</div>
        <div>
          <div class="eyebrow">Local MVP</div>
          <div class="brand-title">Padel Club</div>
        </div>
      </div>
      <nav class="global-tabs" id="globalTabs">
        <button class="tab is-active" data-screen="tournaments">Tournaments</button>
        <button class="tab" data-screen="club">Club Players</button>
      </nav>
        </div>
  </header>

  <main class="container app-shell">
    <section id="screenTournaments" class="screen is-active">
      <div class="layout-main">
        <aside class="panel tournaments-panel">
          <div class="panel-head">
            <div>
              <div class="section-title">Tournaments</div>
              <div class="section-subtitle">First 3 shown by default</div>
            </div>
            <button class="btn primary" id="newTournamentBtn">+ Tournament</button>
          </div>

          <div class="tournament-table-header tournament-row">
            <div>Name</div>
            <div>Date</div>
            <div>Place</div>
            <div>Start</div>
            <div>Duration</div>
            <div>Status</div>
          </div>

          <div id="tournamentRows" class="tournament-list"></div>
          <button class="link-btn" id="historyToggleBtn">Show history</button>
        </aside>

        <section class="details-panel">
          <div class="hero-card" id="selectedTournamentHero"></div>

          <div class="detail-tabs" id="detailTabs">
            <button class="tab is-active" data-detail-tab="overview">Overview</button>
            <button class="tab" data-detail-tab="players">Players</button>
            <button class="tab" data-detail-tab="schedule">Schedule</button>
            <button class="tab" data-detail-tab="standings">Standings</button>
          </div>

          <div id="overviewTab" class="detail-view is-active"></div>
          <div id="playersTab" class="detail-view"></div>
          <div id="scheduleTab" class="detail-view"></div>
          <div id="standingsTab" class="detail-view"></div>
        </section>
      </div>
    </section>

    <section id="screenClub" class="screen">
      <div class="panel">
        <div class="panel-head">
          <div>
            <div class="section-title">Club Players</div>
            <div class="section-subtitle">Only approved players can join tournaments</div>
          </div>
          <button class="btn primary" id="addClubPlayerBtn">+ Player</button>
        </div>
        <div class="club-toolbar">
          <input id="clubSearchInput" class="search-input" type="text" placeholder="Search player" />
          <select id="clubStatusFilter" class="select compact">
            <option value="all">All statuses</option>
            <option value="Approved">Approved</option>
            <option value="Pending">Pending</option>
            <option value="Blocked">Blocked</option>
          </select>
        </div>
        <div id="clubPlayersTable"></div>
      </div>
    </section>
  </main>

  <div class="modal" id="modalOverlay" hidden aria-hidden="true" style="display:none">
    <div class="modal-card" id="modalCard"></div>
  </div>

  <div class="toast-stack" id="toastStack"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js?v=16.4"></script>
</body>
</html>
