<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tournament OS</title>
  <style>
    :root{
      --bg:#07131b;
      --panel: rgba(10, 24, 33, 0.58);
      --panel-strong: rgba(11, 24, 33, 0.72);
      --line: rgba(255,255,255,.10);
      --line-soft: rgba(255,255,255,.06);
      --text:#f5f7fa;
      --muted:#c5d0d9;
      --soft:#95a9b7;
      --green:#39d353;
      --green-soft:rgba(57,211,83,.16);
      --orange:#ff8c1a;
      --orange-soft:rgba(255,140,26,.14);
      --shadow: 0 18px 54px rgba(0,0,0,.34);
      --radius-xl: 26px;
      --radius-lg: 20px;
      --radius-md: 16px;
      --nav-h: 84px;
      --max: 390px;
      --blur: blur(18px) saturate(140%);
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color:var(--text);
      background: #03080d;
      -webkit-font-smoothing:antialiased;
      overflow:hidden;
    }
    body::before{
      content:"";
      position:fixed; inset:0;
      background:
        radial-gradient(80% 60% at 50% 0%, rgba(92,116,255,.18), transparent 60%),
        radial-gradient(60% 45% at 50% 100%, rgba(57,211,83,.14), transparent 55%),
        linear-gradient(180deg, rgba(3,8,13,.25), rgba(3,8,13,.72)),
        url('assets/background.jpg') center/cover no-repeat;
      filter:saturate(108%);
      transform:scale(1.03);
    }
    body::after{
      content:"";
      position:fixed; inset:0;
      background:
        linear-gradient(180deg, rgba(1,4,8,.28) 0%, rgba(1,4,8,.54) 34%, rgba(1,4,8,.84) 100%),
        radial-gradient(circle at 50% 75%, transparent 0%, rgba(0,0,0,.16) 58%, rgba(0,0,0,.44) 100%);
      pointer-events:none;
    }
    .app{
      position:relative;
      z-index:2;
      width:100%; height:100%;
      display:flex; justify-content:center;
      padding:0;
    }
    .phone{
      position:relative;
      width:100%; max-width:var(--max); height:100%;
      display:flex; flex-direction:column;
      margin:0 auto;
    }
    .screen{
      flex:1; overflow:auto; padding:18px 16px calc(var(--nav-h) + 16px);
      scrollbar-width:none;
    }
    .screen::-webkit-scrollbar{display:none}
    .topbar{display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; padding-top:2px}
    .brand{
      display:flex; align-items:center; gap:12px;
      background:rgba(255,255,255,.05); border:1px solid var(--line-soft); padding:10px 12px; border-radius:18px;
      backdrop-filter:var(--blur); box-shadow:var(--shadow);
    }
    .brand-mark{
      width:36px; height:36px; border-radius:12px;
      background:linear-gradient(135deg, rgba(57,211,83,.28), rgba(255,255,255,.08));
      display:grid; place-items:center; border:1px solid rgba(255,255,255,.08);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.15);
      color:var(--green);
    }
    .brand small{display:block; color:var(--soft); font-size:11px; letter-spacing:.14em; text-transform:uppercase; margin-bottom:2px}
    .brand strong{font-size:15px; font-weight:700}
    .ghost-btn{
      width:42px; height:42px; border-radius:14px; border:1px solid var(--line-soft); background:rgba(255,255,255,.05);
      color:var(--text); display:grid; place-items:center; backdrop-filter:var(--blur); box-shadow:var(--shadow); cursor:pointer;
    }
    .hero{
      position:relative;
      border-radius:30px;
      padding:22px 20px 18px;
      background:linear-gradient(180deg, rgba(12,26,37,.64), rgba(11,20,29,.78));
      border:1px solid rgba(255,255,255,.10);
      box-shadow:var(--shadow), inset 0 1px 0 rgba(255,255,255,.12);
      backdrop-filter:blur(22px) saturate(140%);
      overflow:hidden;
      margin-bottom:18px;
    }
    .hero::before{
      content:""; position:absolute; inset:auto -12% 52% auto; width:180px; height:180px; border-radius:50%;
      background:radial-gradient(circle, rgba(57,211,83,.22), transparent 64%);
      filter:blur(4px);
    }
    .eyebrow{color:#d4dde5; font-size:11px; text-transform:uppercase; letter-spacing:.18em; opacity:.8}
    h1{margin:8px 0 10px; font-size:34px; line-height:1.02; letter-spacing:-.04em}
    .hero p{margin:0 0 18px; color:var(--muted); font-size:14px; line-height:1.45; max-width:290px}
    .hero-row{display:flex; gap:10px; flex-wrap:wrap}
    .chip{
      display:inline-flex; align-items:center; gap:8px; min-height:30px; padding:7px 11px;
      border-radius:999px; background:rgba(255,255,255,.06); border:1px solid var(--line-soft); color:#eef4f8; font-size:12px; font-weight:600;
    }
    .chip.green{background:var(--green-soft); color:#bdf4c7; border-color:rgba(57,211,83,.22)}
    .chip.orange{background:var(--orange-soft); color:#ffd2a6; border-color:rgba(255,140,26,.22)}
    .hero-actions{display:flex; gap:10px; margin-top:18px}
    .btn{
      height:44px; border:none; border-radius:16px; padding:0 16px; font-weight:700; cursor:pointer;
      display:inline-flex; align-items:center; gap:10px; font-size:14px;
    }
    .btn-primary{background:linear-gradient(180deg, #42dc5b, #2ec648); color:#04110a; box-shadow:0 12px 24px rgba(57,211,83,.24)}
    .btn-secondary{background:rgba(255,255,255,.06); color:var(--text); border:1px solid var(--line-soft); backdrop-filter:var(--blur)}
    .section-head{
      margin:18px 0 12px;
      display:flex; align-items:center; justify-content:space-between;
      gap:8px;
    }
    .band{
      display:inline-flex; align-items:center; gap:8px;
      padding:8px 12px; border-radius:999px;
      background:linear-gradient(90deg, rgba(57,211,83,.18), rgba(57,211,83,.06));
      border:1px solid rgba(57,211,83,.16);
      color:#dffbe4; font-size:11px; letter-spacing:.16em; text-transform:uppercase; font-weight:800;
    }
    .text-link{color:var(--muted); font-size:13px}
    .stack{display:grid; gap:12px}
    .card{
      position:relative;
      padding:16px;
      border-radius:22px;
      background:linear-gradient(180deg, rgba(11,22,30,.70), rgba(8,17,24,.76));
      border:1px solid rgba(255,255,255,.09);
      box-shadow:var(--shadow), inset 0 1px 0 rgba(255,255,255,.08);
      backdrop-filter:var(--blur);
      cursor:pointer;
      overflow:hidden;
    }
    .card::after{
      content:""; position:absolute; inset:-40% auto auto 62%; width:140px; height:140px; border-radius:50%;
      background:radial-gradient(circle, rgba(255,255,255,.08), transparent 62%);
      pointer-events:none;
    }
    .card-top{display:flex; align-items:flex-start; justify-content:space-between; gap:10px; margin-bottom:12px}
    .icon-badge{
      width:46px; height:46px; border-radius:15px; flex:0 0 auto;
      background:linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.04));
      border:1px solid rgba(255,255,255,.08);
      display:grid; place-items:center; color:var(--green);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.10);
    }
    .card-title{font-size:21px; line-height:1.08; font-weight:800; letter-spacing:-.03em; margin:2px 0 4px}
    .card-sub{font-size:13px; color:var(--muted)}
    .meta-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:14px}
    .meta-box{padding:10px 12px; border-radius:16px; background:rgba(255,255,255,.04); border:1px solid var(--line-soft)}
    .meta-box .k{font-size:11px; color:var(--soft); text-transform:uppercase; letter-spacing:.12em; margin-bottom:4px}
    .meta-box .v{font-size:13px; font-weight:700}
    .match-card .meta-grid{grid-template-columns:1fr 1fr}
    .status-row{display:flex; gap:8px; flex-wrap:wrap}
    .split{display:flex; gap:12px; align-items:center}
    .grow{flex:1}
    .mini{font-size:12px; color:var(--muted)}
    .detail-header{
      display:flex; flex-direction:column; gap:14px; margin-bottom:16px;
    }
    .backline{display:flex; align-items:center; gap:10px}
    .tabs{display:flex; gap:8px; overflow:auto; padding-bottom:2px; scrollbar-width:none}
    .tabs::-webkit-scrollbar{display:none}
    .tab{
      white-space:nowrap;
      height:38px; padding:0 14px; border-radius:999px; border:1px solid var(--line-soft);
      background:rgba(255,255,255,.05); color:var(--muted); font-weight:700; cursor:pointer;
    }
    .tab.active{background:rgba(57,211,83,.16); color:#daf8df; border-color:rgba(57,211,83,.22)}
    .list-row{display:flex; align-items:center; justify-content:space-between; gap:12px; padding:12px 0; border-bottom:1px solid var(--line-soft)}
    .list-row:last-child{border-bottom:none}
    .rank{width:28px; height:28px; border-radius:10px; background:rgba(255,255,255,.05); border:1px solid var(--line-soft); display:grid; place-items:center; font-weight:800; color:#f9fbfd; font-size:13px}
    .activity{display:grid; gap:10px}
    .activity-item{padding:12px 14px; border-radius:16px; background:rgba(255,255,255,.04); border:1px solid var(--line-soft)}
    .activity-item strong{display:block; font-size:13px; margin-bottom:3px}
    .activity-item span{display:block; color:var(--muted); font-size:12px}
    .profile-card{text-align:center; padding:22px 16px}
    .avatar{width:78px; height:78px; border-radius:24px; margin:0 auto 12px; background:linear-gradient(180deg, rgba(57,211,83,.22), rgba(255,255,255,.06)); border:1px solid rgba(255,255,255,.08); display:grid; place-items:center; font-size:28px; font-weight:900; color:#dffbe4}
    .nav{
      position:absolute; left:12px; right:12px; bottom:12px;
      display:grid; grid-template-columns:repeat(4,1fr); gap:8px;
      padding:10px;
      border-radius:24px;
      background:rgba(8,17,24,.72);
      border:1px solid rgba(255,255,255,.10);
      box-shadow:var(--shadow), inset 0 1px 0 rgba(255,255,255,.10);
      backdrop-filter:blur(24px) saturate(150%);
    }
    .nav-btn{
      min-height:58px; border:none; border-radius:18px; background:transparent; color:var(--soft);
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px; cursor:pointer; font-size:11px; font-weight:700;
    }
    .nav-btn.active{background:rgba(255,255,255,.06); color:#f7fafc}
    .hidden{display:none !important}
    .muted{color:var(--muted)}
    .row-actions{display:flex; gap:10px; flex-wrap:wrap; margin-top:14px}
    .pill-score{padding:8px 10px; border-radius:12px; background:rgba(255,255,255,.05); border:1px solid var(--line-soft); font-weight:700; font-size:13px}
    .empty{padding:18px; border-radius:20px; background:rgba(255,255,255,.04); border:1px dashed rgba(255,255,255,.16); color:var(--muted); text-align:center}
    @media (max-width:370px){
      h1{font-size:31px}
      .card-title{font-size:19px}
      .meta-grid{grid-template-columns:1fr 1fr}
    }
  </style>
</head>
<body>
<div class="app">
  <div class="phone">
    <div id="screen" class="screen"></div>
    <nav class="nav" id="nav"></nav>
  </div>
</div>
<script>
(() => {
  const icons = {
    court:`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M12 5v14M3 12h18"/></svg>`,
    bell:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M15 17h5l-1.4-1.4a2 2 0 0 1-.6-1.4V11a6 6 0 1 0-12 0v3.2a2 2 0 0 1-.6 1.4L4 17h5"/><path d="M10 21a2 2 0 0 0 4 0"/></svg>`,
    home:`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.8V21h14V9.8"/></svg>`,
    matches:`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M9 4.5 4.5 9 15 19.5l4.5-4.5z"/><path d="m14 5 5 5"/></svg>`,
    history:`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 4v5h5"/><path d="M12 7v5l3 2"/></svg>`,
    profile:`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21a8 8 0 0 0-16 0"/><circle cx="12" cy="8" r="4"/></svg>`,
    arrow:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>`,
    star:`<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="m12 2 2.9 6 6.6.8-4.8 4.5 1.2 6.5-5.9-3.2-5.9 3.2 1.2-6.5L2.5 8.8l6.6-.8z"/></svg>`
  };

  const state = {
    view:'home',
    detailId:'t1',
    detailTab:'overview',
    me:'p1',
    profiles:[
      {id:'p1', name:'Nikolajs Pogodins', level:'Advanced', club:'Padel Riga'},
      {id:'p2', name:'Andrey Zhdan'},
      {id:'p3', name:'Mark Sokolov'},
      {id:'p4', name:'Atis Berzins'},
      {id:'p5', name:'Katrina Ozola'},
      {id:'p6', name:'Eriks Jansons'},
      {id:'p7', name:'Maksim Petrov'},
      {id:'p8', name:'Deniss Volkovs'}
    ],
    tournaments:[
      {id:'t1', name:'Evening League • Riga', club:'Padel Riga', date:'Today · 19:30', court:'Court 2', status:'live', format:'Americano', players:16, capacity:16, venue:'Arena Center', badge:'LIVE', accent:'green', description:'Fast evening round with live standings and self-submitted results.'},
      {id:'t2', name:'Saturday Open • Jurmala', club:'Jurmala Padel', date:'Sat · 10:00', court:'Center', status:'joined', format:'Mexicano', players:12, capacity:16, venue:'Beach Dome', badge:'JOINED', accent:'green', description:'Weekend open with dynamic reseeding and simple match flow.'},
      {id:'t3', name:'Spring Cup • Daugavpils', club:'Daugavpils Club', date:'Sun · 14:00', court:'Court 1', status:'available', format:'Group Stage', players:10, capacity:16, venue:'D-Padel Hall', badge:'OPEN', accent:'orange', description:'Open registration. Join now and get auto-scheduled matches.'},
      {id:'t4', name:'Night Session • Riga', club:'Padel Riga', date:'Mon · 21:00', court:'Court 3', status:'available', format:'Americano', players:7, capacity:12, venue:'Arena Center', badge:'OPEN', accent:'orange', description:'Compact late evening session with premium pace and short rounds.'},
      {id:'t5', name:'Winter Finals', club:'Padel Riga', date:'Finished', court:'Court 1', status:'finished', format:'Playoff', players:16, capacity:16, venue:'Arena Center', badge:'FINISHED', accent:'green', description:'Completed tournament archived in history.'}
    ],
    standings:{
      t1:[
        {player:'Nikolajs Pogodins', pts:9, diff:'+11'},
        {player:'Mark Sokolov', pts:8, diff:'+7'},
        {player:'Atis Berzins', pts:6, diff:'+2'},
        {player:'Andrey Zhdan', pts:5, diff:'-1'}
      ],
      t2:[
        {player:'Nikolajs Pogodins', pts:0, diff:'0'},
        {player:'Katrina Ozola', pts:0, diff:'0'}
      ]
    },
    matches:[
      {id:'m1', tid:'t1', title:'Round 3', time:'19:50', court:'Court 2', meTeam:['Nikolajs Pogodins','Mark Sokolov'], opp:['Atis Berzins','Andrey Zhdan'], submitted:false, score:null},
      {id:'m2', tid:'t1', title:'Round 4', time:'20:20', court:'Court 1', meTeam:['Nikolajs Pogodins','Katrina Ozola'], opp:['Eriks Jansons','Deniss Volkovs'], submitted:true, score:'6:3 4:6 10:8'},
      {id:'m3', tid:'t2', title:'Round 1', time:'Sat 10:20', court:'Center', meTeam:['Nikolajs Pogodins','Katrina Ozola'], opp:['Maksim Petrov','Deniss Volkovs'], submitted:false, score:null}
    ],
    activity:[
      {id:'a1', title:'Result submitted', sub:'Round 4 • Evening League • 6:3 4:6 10:8'},
      {id:'a2', title:'Joined tournament', sub:'Saturday Open • Jurmala'},
      {id:'a3', title:'Tournament is live', sub:'Evening League • Riga'}
    ]
  };

  const nav = [
    {id:'home', label:'Home', icon:icons.home},
    {id:'matches', label:'Matches', icon:icons.matches},
    {id:'history', label:'History', icon:icons.history},
    {id:'profile', label:'Profile', icon:icons.profile}
  ];

  const $screen = document.getElementById('screen');
  const $nav = document.getElementById('nav');

  function pill(text, cls='') { return `<span class="chip ${cls}">${text}</span>`; }
  function iconBadge(svg){ return `<div class="icon-badge">${svg}</div>`; }
  function btn(label, cls, action, extra=''){ return `<button class="btn ${cls}" data-action="${action}" ${extra}>${label}</button>`; }
  function getTournament(id){ return state.tournaments.find(t=>t.id===id); }
  function activeTournaments(){ return state.tournaments.filter(t=>['live','joined'].includes(t.status)); }
  function availableTournaments(){ return state.tournaments.filter(t=>t.status==='available'); }
  function historyTournaments(){ return state.tournaments.filter(t=>t.status==='finished'); }
  function renderTop(title='Tournament OS', sub='Player home', action=true){
    return `
      <div class="topbar">
        <button class="brand" data-action="go-home">
          <div class="brand-mark">${icons.star}</div>
          <div><small>${sub}</small><strong>${title}</strong></div>
        </button>
        ${action ? `<button class="ghost-btn" data-action="noop">${icons.bell}</button>` : `<div style="width:42px"></div>`}
      </div>`;
  }
  function renderHero(){
    return `
      <section class="hero">
        <div class="eyebrow">Player-first tournament flow</div>
        <h1>Play.<br>Track.<br>Submit.</h1>
        <p>Premium mobile home for live padel tournaments across clubs. Your next court, next match and next action — in one place.</p>
        <div class="hero-row">
          ${pill('2 active tournaments','green')}
          ${pill('1 result pending')}
          ${pill('Premium minimal UI')}
        </div>
        <div class="hero-actions">
          ${btn('My matches','btn-primary','view-matches')}
          ${btn('Browse new','btn-secondary','browse-new')}
        </div>
      </section>`;
  }
  function tournamentCard(t){
    const statusClass = t.accent === 'orange' ? 'orange' : 'green';
    return `
      <article class="card" data-action="open-detail" data-id="${t.id}">
        <div class="card-top">
          <div class="split grow">
            ${iconBadge(icons.court)}
            <div class="grow">
              <div class="card-title">${t.name}</div>
              <div class="card-sub">${t.club} · ${t.format}</div>
            </div>
          </div>
          ${pill(t.badge, statusClass)}
        </div>
        <div class="status-row">
          ${pill(t.date)}
          ${pill(t.venue)}
        </div>
        <div class="meta-grid">
          <div class="meta-box"><div class="k">Players</div><div class="v">${t.players}/${t.capacity}</div></div>
          <div class="meta-box"><div class="k">Court</div><div class="v">${t.court}</div></div>
          <div class="meta-box"><div class="k">Status</div><div class="v">${t.badge}</div></div>
        </div>
      </article>`;
  }
  function matchCard(m){
    const t = getTournament(m.tid);
    return `
      <article class="card match-card" data-action="open-detail" data-id="${m.tid}">
        <div class="card-top">
          <div>
            <div class="card-title">${m.title}</div>
            <div class="card-sub">${t.name} · ${m.time} · ${m.court}</div>
          </div>
          ${m.submitted ? pill('RESULT IN','green') : pill('PENDING','orange')}
        </div>
        <div class="meta-grid">
          <div class="meta-box"><div class="k">Your team</div><div class="v">${m.meTeam.join(' / ')}</div></div>
          <div class="meta-box"><div class="k">Opponents</div><div class="v">${m.opp.join(' / ')}</div></div>
        </div>
        <div class="row-actions">
          ${m.score ? `<span class="pill-score">${m.score}</span>` : ''}
          ${m.submitted ? '' : btn('Submit result','btn-primary','submit-result',`data-id="${m.id}"`)}
        </div>
      </article>`;
  }
  function renderHome(){
    return `
      ${renderTop('Tournament OS','Player home')}
      ${renderHero()}
      <div class="section-head"><div class="band">My tournaments</div><div class="text-link">Active now</div></div>
      <div class="stack">${activeTournaments().map(tournamentCard).join('')}</div>
      <div class="section-head"><div class="band">Available tournaments</div><div class="text-link">Open registration</div></div>
      <div class="stack">${availableTournaments().map(tournamentCard).join('')}</div>
      <div class="section-head"><div class="band">Recent activity</div><div class="text-link">Latest actions</div></div>
      <div class="activity">${state.activity.map(a=>`<div class="activity-item"><strong>${a.title}</strong><span>${a.sub}</span></div>`).join('')}</div>
    `;
  }
  function renderMatches(){
    return `
      ${renderTop('My Matches','Player view')}
      <section class="hero" style="padding-bottom:16px">
        <div class="eyebrow">Ready to play</div>
        <h1 style="font-size:30px">Only your own match feed.</h1>
        <p>Partner, opponents, court, time and score submission. No clutter and no extra admin noise.</p>
      </section>
      <div class="section-head"><div class="band">Upcoming & live</div><div class="text-link">${state.matches.length} match cards</div></div>
      <div class="stack">${state.matches.map(matchCard).join('')}</div>
    `;
  }
  function renderHistory(){
    const items = historyTournaments();
    return `
      ${renderTop('History','Archive')}
      <section class="hero" style="padding-bottom:16px">
        <div class="eyebrow">Finished tournaments</div>
        <h1 style="font-size:30px">Past events stay out of Home.</h1>
        <p>History is separated from active play, so the main screen stays clean and useful.</p>
      </section>
      <div class="stack">${items.length ? items.map(tournamentCard).join('') : `<div class="empty">No finished tournaments yet.</div>`}</div>
    `;
  }
  function renderProfile(){
    const me = state.profiles.find(p=>p.id===state.me);
    return `
      ${renderTop('Profile','Player account')}
      <article class="card profile-card">
        <div class="avatar">NP</div>
        <div class="card-title" style="margin-bottom:6px">${me.name}</div>
        <div class="card-sub">${me.club} · ${me.level}</div>
        <div class="meta-grid" style="margin-top:18px">
          <div class="meta-box"><div class="k">Active</div><div class="v">2</div></div>
          <div class="meta-box"><div class="k">Matches</div><div class="v">3</div></div>
          <div class="meta-box"><div class="k">Results</div><div class="v">1</div></div>
        </div>
      </article>
      <div class="section-head"><div class="band">Preferences</div><div class="text-link">UI baseline</div></div>
      <div class="activity">
        <div class="activity-item"><strong>Style</strong><span>Clean premium / minimalism</span></div>
        <div class="activity-item"><strong>Accent</strong><span>Green retained as primary action color</span></div>
        <div class="activity-item"><strong>Architecture</strong><span>Single-file / GitHub-safe runtime</span></div>
      </div>
    `;
  }
  function renderDetail(){
    const t = getTournament(state.detailId);
    const standings = state.standings[t.id] || [];
    const tourMatches = state.matches.filter(m=>m.tid===t.id);
    return `
      <div class="detail-header">
        <div class="backline">
          <button class="ghost-btn" data-action="go-back">${icons.arrow}</button>
          <div class="brand" data-action="go-home"><div class="brand-mark">${icons.star}</div><div><small>${t.club}</small><strong>${t.name}</strong></div></div>
        </div>
        <section class="hero" style="margin-bottom:0">
          <div class="eyebrow">${t.badge} · ${t.format}</div>
          <h1 style="font-size:31px">${t.name}</h1>
          <p>${t.description}</p>
          <div class="hero-row">
            ${pill(t.date)}
            ${pill(t.venue)}
            ${pill(`${t.players}/${t.capacity} players`, t.status === 'available' ? 'orange' : 'green')}
          </div>
          <div class="hero-actions">
            ${t.status === 'available' ? btn('Join tournament','btn-primary','join',`data-id="${t.id}"`) : ''}
            ${['joined','live'].includes(t.status) ? btn('Withdraw','btn-secondary','withdraw',`data-id="${t.id}"`) : ''}
          </div>
        </section>
        <div class="tabs">
          ${['overview','matches','standings','players'].map(tab=>`<button class="tab ${state.detailTab===tab?'active':''}" data-action="tab" data-tab="${tab}">${tab[0].toUpperCase()+tab.slice(1)}</button>`).join('')}
        </div>
      </div>
      ${state.detailTab==='overview' ? `
        <div class="stack">
          <article class="card">
            <div class="card-title">Tournament snapshot</div>
            <div class="meta-grid">
              <div class="meta-box"><div class="k">Format</div><div class="v">${t.format}</div></div>
              <div class="meta-box"><div class="k">Venue</div><div class="v">${t.venue}</div></div>
              <div class="meta-box"><div class="k">Court</div><div class="v">${t.court}</div></div>
            </div>
          </article>
          <article class="card">
            <div class="card-title">Recent activity</div>
            <div class="activity">${state.activity.slice(0,2).map(a=>`<div class="activity-item"><strong>${a.title}</strong><span>${a.sub}</span></div>`).join('')}</div>
          </article>
        </div>` : ''}
      ${state.detailTab==='matches' ? `<div class="stack">${tourMatches.length ? tourMatches.map(matchCard).join('') : `<div class="empty">No match cards yet.</div>`}</div>` : ''}
      ${state.detailTab==='standings' ? `<article class="card"><div class="card-title" style="margin-bottom:10px">Current standings</div>${standings.map((row,i)=>`<div class="list-row"><div class="split"><div class="rank">${i+1}</div><div><div style="font-weight:700">${row.player}</div><div class="mini">Point diff ${row.diff}</div></div></div><div style="font-weight:800">${row.pts} pts</div></div>`).join('')}</article>` : ''}
      ${state.detailTab==='players' ? `<article class="card"><div class="card-title" style="margin-bottom:10px">Registered players</div>${['Nikolajs Pogodins','Mark Sokolov','Atis Berzins','Andrey Zhdan','Katrina Ozola','Eriks Jansons'].map((name,i)=>`<div class="list-row"><div class="split"><div class="rank">${i+1}</div><div style="font-weight:700">${name}</div></div>${pill(i<4?'confirmed':'joined', i<4?'green':'')}</div>`).join('')}</article>` : ''}
    `;
  }

  function renderNav(){
    $nav.innerHTML = nav.map(item=>`
      <button class="nav-btn ${state.view===item.id?'active':''}" data-action="navigate" data-view="${item.id}">
        <span>${item.icon}</span><span>${item.label}</span>
      </button>
    `).join('');
  }
  function render(){
    let html = '';
    if(state.view==='home') html = renderHome();
    if(state.view==='matches') html = renderMatches();
    if(state.view==='history') html = renderHistory();
    if(state.view==='profile') html = renderProfile();
    if(state.view==='detail') html = renderDetail();
    $screen.innerHTML = html;
    renderNav();
  }
  function submitResult(id){
    const m = state.matches.find(x=>x.id===id);
    if(!m) return;
    m.submitted = true;
    m.score = '6:4 6:3';
    state.activity.unshift({id:'a'+Date.now(), title:'Result submitted', sub:`${m.title} • ${getTournament(m.tid).name} • ${m.score}`});
    if(state.standings[m.tid]) state.standings[m.tid][0].pts += 3;
  }

  document.addEventListener('click', (e) => {
    const el = e.target.closest('[data-action]');
    if(!el) return;
    const action = el.dataset.action;
    if(action==='navigate'){ state.view = el.dataset.view; render(); }
    if(action==='go-home'){ state.view='home'; render(); }
    if(action==='view-matches'){ state.view='matches'; render(); }
    if(action==='browse-new'){ state.view='home'; setTimeout(()=>window.scrollTo({top:520,behavior:'smooth'}),20); }
    if(action==='open-detail'){ state.detailId = el.dataset.id; state.view='detail'; state.detailTab='overview'; render(); }
    if(action==='go-back'){ state.view='home'; render(); }
    if(action==='tab'){ state.detailTab = el.dataset.tab; render(); }
    if(action==='join'){
      const t = getTournament(el.dataset.id); t.status='joined'; t.badge='JOINED'; t.accent='green'; t.players += 1;
      state.activity.unshift({id:'a'+Date.now(), title:'Joined tournament', sub:t.name});
      render();
    }
    if(action==='withdraw'){
      const t = getTournament(el.dataset.id); if(t.status==='live') { state.activity.unshift({id:'a'+Date.now(), title:'Withdraw blocked', sub:'Live tournament requires admin override'}); render(); return; }
      t.status='available'; t.badge='OPEN'; t.accent='orange'; t.players = Math.max(0, t.players - 1);
      state.activity.unshift({id:'a'+Date.now(), title:'Withdrawn', sub:t.name});
      render();
    }
    if(action==='submit-result'){ submitResult(el.dataset.id); render(); }
  });

  render();
})();
</script>
</body>
</html>
