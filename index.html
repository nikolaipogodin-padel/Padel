<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Padel Riga</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand-block">
        <div class="brand-mark">P</div>
        <div>
          <div class="brand-name">Padel Riga</div>
          <div class="brand-sub">Турнирный планировщик</div>
        </div>
      </div>

      <nav class="anchor-nav" aria-label="Навигация по разделам">
        <a href="#playersSection">Игроки</a>
        <a href="#paramsSection">Параметры</a>
        <a href="#pairsSection">Пары</a>
        <a href="#scheduleSection">Сетка</a>
        <a href="#resultsSection">Результаты</a>
      </nav>

      <div class="toolbar">
        <button id="demo20Btn" class="btn secondary">Демо 20</button>
        <button id="generateBtn" class="btn primary">Сформировать</button>
        <button id="resetBtn" class="btn ghost">Сбросить</button>
      </div>
    </div>
  </header>

  <main class="app-shell">
    <section class="hero card">
      <div class="hero-grid">
        <div>
          <div class="eyebrow">Padel Riga</div>
          <h1 id="heroTournamentName">Riga Padel Cup</h1>
          <div class="hero-meta-row">
            <span class="hero-meta-pill" id="heroDateLabel">12.04.2026</span>
            <span class="hero-meta-pill" id="heroStatusLabel">Турнир не сформирован</span>
          </div>
        </div>
        <div id="summaryView" class="summary-grid"></div>
      </div>
    </section>

    <section id="playersSection" class="section-block card">
      <div class="section-head">
        <div>
          <div class="section-kicker">Шаг 1</div>
          <h2>Игроки</h2>
        </div>
        <div id="participantsCount" class="pill">0</div>
      </div>

      <form id="playerForm" class="add-player-row">
        <input id="playerName" type="text" placeholder="Имя игрока" required />
        <button type="submit" class="btn primary">Добавить</button>
      </form>

      <div id="playersView" class="players-compact"></div>
    </section>

    <section id="paramsSection" class="section-block card">
      <div class="section-head">
        <div>
          <div class="section-kicker">Шаг 2</div>
          <h2>Параметры турнира</h2>
        </div>
      </div>

      <div class="settings-grid">
        <label>
          Название
          <input id="tournamentName" type="text" value="Riga Padel Cup" />
        </label>
        <label>
          Дата
          <input id="tournamentDate" type="date" value="2026-04-12" />
        </label>
        <label>
          Старт
          <input id="startTime" type="time" value="10:00" />
        </label>
        <label>
          Длительность
          <select id="durationSelect">
            <option value="90">1.5 часа</option>
            <option value="120" selected>2 часа</option>
            <option value="180">3 часа</option>
          </select>
        </label>
      </div>
    </section>

    <section id="pairsSection" class="section-block split-grid">
      <section class="card">
        <div class="section-head">
          <div>
            <div class="section-kicker">Шаг 3</div>
            <h2>Пары</h2>
          </div>
          <div id="pairsCount" class="pill">0</div>
        </div>
        <div id="pairsView" class="list"></div>
      </section>

      <section class="card">
        <div class="section-head">
          <div>
            <div class="section-kicker">Шаг 3</div>
            <h2>Очередь</h2>
          </div>
          <div id="queueCount" class="pill">0</div>
        </div>
        <div id="queueView" class="list"></div>
      </section>
    </section>

    <section id="scheduleSection" class="section-block card">
      <div class="section-head">
        <div>
          <div class="section-kicker">Шаг 4</div>
          <h2>Сетка</h2>
          <div id="scheduleMeta" class="muted"></div>
        </div>
      </div>
      <div id="scheduleView" class="schedule"></div>
    </section>

    <section id="resultsSection" class="section-block split-grid split-60-40">
      <section class="card">
        <div class="section-head">
          <div>
            <div class="section-kicker">Шаг 5</div>
            <h2>Результаты</h2>
          </div>
        </div>
        <div id="matchesView" class="matches"></div>
      </section>

      <section class="card">
        <div class="section-head">
          <div>
            <div class="section-kicker">Шаг 5</div>
            <h2>Таблица</h2>
          </div>
        </div>
        <div id="standingsView"></div>
      </section>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
