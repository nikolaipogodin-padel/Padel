<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Padel Riga</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <section class="card topbar">
      <div>
        <h1>Padel Riga</h1>
        <div class="muted" id="tournamentMeta">Sunday Cup • Riga • 12.04.2026</div>
      </div>
      <div class="status" id="tournamentStatus">Регистрация открыта</div>
    </section>

    <section class="grid">
      <div class="card">
        <div class="section-head">
          <h2>Игроки</h2>
          <div class="count" id="participantsCount">0</div>
        </div>
        <form id="playerForm" class="form">
          <input type="text" id="playerName" placeholder="Имя игрока" required />
          <input type="text" id="playerContact" placeholder="Контакт" />
          <select id="playerLevel">
            <option value="Beginner">Beginner</option>
            <option value="Intermediate" selected>Intermediate</option>
            <option value="Advanced">Advanced</option>
          </select>
          <div class="actions">
            <button type="submit" class="btn primary">Добавить игрока</button>
            <button type="button" class="btn" id="demoPlayersBtn">Демо 20</button>
            <button type="button" class="btn" id="resetBtn">Сбросить</button>
          </div>
        </form>
        <div id="participantsList" class="stack"></div>
      </div>

      <div class="card">
        <div class="section-head">
          <h2>Турнир</h2>
          <button class="btn primary" id="generateBtn">Сформировать турнир</button>
        </div>
        <div id="groupsView" class="stack empty">Пока турнир не сформирован.</div>
      </div>
    </section>

    <section class="grid">
      <div class="card">
        <h2>Таблица</h2>
        <div id="standingsView" class="stack empty">Нет данных.</div>
      </div>

      <div class="card wide">
        <h2>Матчи</h2>
        <div id="matchesView" class="stack empty">Нет матчей.</div>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
